name: GLaDOS Daily Checkin

# 触发条件
on:
  schedule:
    # 每天北京时间上午 8:05 运行 (Cron 表达式是 UTC 时间，北京时间 = UTC + 8)
    - cron: '11 2 * * *'
  workflow_dispatch: # 允许手动点击按钮触发执行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run checkin script
        env:
          # 从 GitHub Secrets 中读取变量
          SERVE: ${{ secrets.SERVE }}
          SCKEY: ${{ secrets.SCKEY }}
          COOKIE: ${{ secrets.COOKIE }}
        run: python checkin.py
